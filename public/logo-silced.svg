<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <!-- Main text SIL -->
  <text x="10" y="68" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="#1e3a5f" letter-spacing="-1">SIL</text>
  <!-- X mark with Italian flag colors -->
  <g transform="translate(138, 18)">
    <!-- Green stroke -->
    <line x1="0" y1="52" x2="22" y2="0" stroke="#009246" stroke-width="8" stroke-linecap="round"/>
    <!-- White stroke -->
    <line x1="11" y1="52" x2="33" y2="0" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <!-- Red stroke -->  
    <line x1="22" y1="52" x2="44" y2="0" stroke="#CE2B37" stroke-width="8" stroke-linecap="round"/>
    <!-- Cross strokes -->
    <line x1="0" y1="0" x2="22" y2="52" stroke="#009246" stroke-width="8" stroke-linecap="round"/>
    <line x1="11" y1="0" x2="33" y2="52" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="22" y1="0" x2="44" y2="52" stroke="#CE2B37" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Main text CED -->
  <text x="182" y="68" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="62" fill="#1e3a5f" letter-spacing="-1">CED</text>
  <!-- Tagline -->
  <text x="160" y="92" font-family="Arial, sans-serif" font-weight="600" font-size="8.5" fill="#1e3a5f" text-anchor="middle" letter-spacing="1.5">SINDACATO ITALIANO LAVORATORI CENTRI ELABORAZIONE DATI</text>
</svg>
